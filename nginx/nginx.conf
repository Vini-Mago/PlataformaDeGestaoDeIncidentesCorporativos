events {
    worker_connections 1024;
}

http {
    upstream identity {
        # Serviços rodando no host (pnpm run dev) ou host.docker.internal em Linux
        server host.docker.internal:3001;
    }

    upstream request {
        server host.docker.internal:3002;
    }

    upstream incidents {
        server host.docker.internal:3004;
    }

    upstream problem_change {
        server host.docker.internal:3005;
    }

    upstream sla {
        server host.docker.internal:3006;
    }

    upstream api_docs {
        server host.docker.internal:3003;
    }

    server {
        listen 80;
        server_name localhost;

        # Identity: /identity/*
        location /identity/ {
            proxy_pass http://identity/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Gateway "nginx" always;
        }

        # Request (service catalog + service requests): /request/*
        location /request/ {
            proxy_pass http://request/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Gateway "nginx" always;
        }

        # Incidents: /incidents/*
        location /incidents/ {
            proxy_pass http://incidents/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Gateway "nginx" always;
        }

        # Problem-change: /problem-change/*
        location /problem-change/ {
            proxy_pass http://problem_change/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Gateway "nginx" always;
        }

        # SLA: /sla/*
        location /sla/ {
            proxy_pass http://sla/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Gateway "nginx" always;
        }

        # Swagger unificado: /api-docs/*
        location /api-docs/ {
            proxy_pass http://api_docs/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Gateway "nginx" always;
        }

        # Health do gateway
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        location / {
            return 404 '{"error":"Not Found","message":"Use /identity/, /request/, /incidents/, /problem-change/, /sla/ or /api-docs/"}';
            add_header Content-Type application/json;
        }
    }
}
